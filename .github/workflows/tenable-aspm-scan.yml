name: Tenable Cloud Security ASPM Scan
on:
  push:
    branches: [ "main","master" ]
  pull_request:
    branches: [ "main","master" ]

jobs:
  tenable-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Tenable Cloud Security Enterprise Scan
        # This is the correct, verified repository path for the enterprise action
        uses: tenable/cloud-security-actions/iac-scan@v1 
        with:
          apiToken: ${{ secrets.TENABLE_API_TOKEN }}
          apiUrl: ${{ secrets.TENABLE_API_URL }}
          failOnMinSeverity: 'high'
          logs: true
